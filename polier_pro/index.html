<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polaris</title>
  <style>
    body { background: #0B1120; color: #F0F4FF; font-family: system-ui; margin: 0; padding: 20px; }
    #error-box { background: #1E293B; border: 2px solid #FF6B6B; border-radius: 10px;
      padding: 16px; margin-top: 16px; display: none; word-break: break-all; font-size: 13px; }
    #status { color: #F5C400; font-size: 20px; font-weight: 900; }
  </style>
</head>
<body>
  <div id="status">★ POLARIS lädt...</div>
  <div id="error-box"></div>
  <div id="root"></div>

  <script>
    // Fange ALLE Fehler vor React
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById("status").textContent = "★ POLARIS – Fehler";
      document.getElementById("status").style.color = "#FF6B6B";
      var box = document.getElementById("error-box");
      box.style.display = "block";
      box.innerHTML = "<strong>" + msg + "</strong><br><br>" +
        "Datei: " + src + "<br>" +
        "Zeile: " + line + ":" + col + "<br><br>" +
        (err && err.stack ? err.stack.substring(0,300) : "");
      return false;
    };
    window.onunhandledrejection = function(e) {
      document.getElementById("status").textContent = "★ POLARIS – Promise Fehler";
      document.getElementById("status").style.color = "#FF6B6B";
      var box = document.getElementById("error-box");
      box.style.display = "block";
      box.innerHTML = "<strong>Unhandled Promise:</strong><br>" + e.reason;
    };
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
