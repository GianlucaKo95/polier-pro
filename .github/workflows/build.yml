name: Build & Deploy Polier Pro Add-on

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/polier-pro-addon

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch:
          - aarch64   # Raspberry Pi 4 (64-bit) – typisches HA-System
          - amd64     # x86 Server / VM
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}/${{ matrix.arch }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔧 QEMU (für Cross-Build)
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      ha-addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push:      ${{ github.event_name != 'pull_request' }}
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,scope=${{ matrix.arch }},mode=max

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ha-addon/config.yaml
