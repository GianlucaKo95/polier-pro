name: Build & Deploy Polier Pro Add-on

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/polier-pro-addon

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from config.yaml
        id: version
        run: |
          cat polier_pro/config.yaml
          VERSION=$(grep "^version:" polier_pro/config.yaml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      # Diagnose: prüft NUR ob die Secrets überhaupt gesetzt sind (Länge > 0),
      # ohne den Wert selbst preiszugeben. GitHub maskiert Secret-Werte in
      # Logs automatisch, aber diese Prüfung macht explizit sichtbar, falls
      # ein Secret fehlt oder falsch benannt wurde — die häufigste Ursache
      # für "ERR_NAME_NOT_RESOLVED" beim Login (Fallback-Platzhalter-URL
      # wird verwendet, weil die echte URL leer beim Build ankam).
      - name: Verify secrets are set (length check only)
        run: |
          URL_LEN=$(echo -n "${{ secrets.VITE_SUPABASE_URL }}" | wc -c)
          KEY_LEN=$(echo -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" | wc -c)
          echo "VITE_SUPABASE_URL length: $URL_LEN characters"
          echo "VITE_SUPABASE_ANON_KEY length: $KEY_LEN characters"
          if [ "$URL_LEN" -eq 0 ]; then
            echo "::error::VITE_SUPABASE_URL secret is EMPTY or not set! Check Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ "$KEY_LEN" -eq 0 ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY secret is EMPTY or not set! Check Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Both secrets appear to be set correctly."

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}/${{ matrix.arch }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=ref,event=branch

      - name: QEMU
        uses: docker/setup-qemu-action@v3

      - name: Buildx
        uses: docker/setup-buildx-action@v3

      # Supabase-Zugangsdaten kommen aus GitHub Repo Secrets, NICHT aus dem
      # Code. Einmalig einrichten unter: Repo → Settings → Secrets and
      # variables → Actions → New repository secret:
      #   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
      - name: Build & Push (no cache)
        uses: docker/build-push-action@v6
        with:
          context: polier_pro
          file: polier_pro/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
